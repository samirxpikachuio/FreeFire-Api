syntax = "proto3";

package PlayerStats;

message request {
  uint64 accountid = 1;
  uint32 matchmode = 2;
}

message response {
  AccountInfoWithStatsToClient solostats = 1;
  AccountInfoWithStatsToClient duostats = 2;
  AccountInfoWithStatsToClient quadstats = 3;
}

message AccountInfoWithStatsToClient {
  uint64 accountid = 1;
  uint32 gamesplayed = 2;
  uint32 wins = 3;
  uint32 kills = 4;
  PlayerDetailedStats detailedstats = 5;
}

message PlayerDetailedStats {
    uint32 deaths = 1;
    uint32 top10_times = 2;
    uint32 top_n_times = 3;
    uint32 distance_travelled = 4;
    uint32 survival_time = 5;
    uint32 revives = 6;
    uint32 highest_kills = 7;
    uint32 damage = 8;
    uint32 road_kills = 9;
    uint32 headshots = 10;
    uint32 headshot_kills = 11;
    uint32 knock_down = 12;
    uint32 pick_ups = 13;
    double rating_points = 14;
    uint32 rating_enabled_games = 15;
    uint32 gold_medal_cnt = 16;
    uint32 silver_medal_cnt = 17;
}